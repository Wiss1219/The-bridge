<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Bridge</title>
  <link rel="icon" type="image/png" href="/Lockup-White.png" />
  <meta name="description" content="The Bridge: A personalized adaptive learning platform.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body,
    #root {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #080C18;
      color: white;
      overflow: hidden;
    }

    h1,
    h2,
    h3,
    .brand {
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.4);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(99, 102, 241, 0.7);
    }

    /* Glow utility */
    .glow-blue {
      box-shadow: 0 0 24px rgba(59, 130, 246, 0.35), 0 0 60px rgba(59, 130, 246, 0.12);
    }

    .glow-purple {
      box-shadow: 0 0 24px rgba(139, 92, 246, 0.35), 0 0 60px rgba(139, 92, 246, 0.12);
    }

    .text-glow {
      text-shadow: 0 0 30px rgba(99, 130, 255, 0.7);
    }

    /* Glass card */
    .glass {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .glass-strong {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* Animations */
    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(1);
        opacity: 0.7;
      }

      100% {
        transform: scale(1.6);
        opacity: 0;
      }
    }

    @keyframes gradient-shift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    @keyframes orbit {
      from {
        transform: rotate(0deg) translateX(60px) rotate(0deg);
      }

      to {
        transform: rotate(360deg) translateX(60px) rotate(-360deg);
      }
    }

    .animate-float {
      animation: float 4s ease-in-out infinite;
    }

    .animate-slide-up {
      animation: slide-up 0.5s ease forwards;
    }

    .animate-gradient {
      background-size: 200% 200%;
      animation: gradient-shift 5s ease infinite;
    }

    .shimmer-text {
      background: linear-gradient(90deg, #fff 30%, #818cf8 50%, #fff 70%);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }

    /* Progress bar */
    @keyframes progress-fill {
      from {
        width: 0;
      }
    }

    .progress-bar {
      animation: progress-fill 0.6s ease-out forwards;
    }

    /* Orbit dot */
    .orbit-dot {
      animation: orbit 3s linear infinite;
    }

    /* XP pill flash */
    @keyframes xp-flash {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .xp-flash {
      animation: xp-flash 0.6s ease 3;
    }
  </style>

{

</head>
